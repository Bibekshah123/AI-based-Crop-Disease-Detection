services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crop_disease
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d crop_disease"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - TF_CPP_MIN_LOG_LEVEL=2
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=crop_disease
      - DB_USER=app
      - DB_PASSWORD=app_password
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  adminer:
    image: adminer
    ports:
      - "8080:8080"
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
